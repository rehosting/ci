name: Nix setup
description: >-
  Install Nix and wire up a binary cache so any rehosting repo can run Nix
  builds without re-deriving the install + caching boilerplate. Generalizes the
  three flavors already in the org: hyperfs (install-nix-action +
  GitHub-Actions-cache via cache-nix-action), unblob (install-nix-action +
  Cachix), and smallworld (DeterminateSystems installer).

  Pick the installer with `installer` and the cache backend with `cache-backend`
  (github | cachix | both | none). Everything else has a working default, so the
  minimal call is just `uses: rehosting/ci/actions/nix-setup@v1`.

inputs:
  installer:
    description: "Nix installer: 'cachix' (cachix/install-nix-action) or 'determinate' (DeterminateSystems)"
    required: false
    default: cachix
  install-url:
    description: Pin a specific Nix release installer URL (cachix installer only)
    required: false
    default: ""
  github-token:
    description: >-
      GITHUB_TOKEN, used as a Nix access-token to avoid github.com API rate
      limits when fetching flake inputs. Strongly recommended.
    required: false
    default: ""
  extra-nix-config:
    description: Extra lines appended to nix.conf (e.g. "max-jobs = 8", "cores = 8")
    required: false
    default: ""
  cache-backend:
    description: "Binary cache backend: github | cachix | both | none"
    required: false
    default: github
  cache-key:
    description: Primary key for the GitHub-Actions Nix store cache (github/both backends)
    required: false
    default: ""
  gc-max-store-size:
    description: >-
      Trim the Nix store to this many bytes before saving the GitHub cache, to
      stay under the cache size limit (github/both backends). Empty = no trim.
    required: false
    default: ""
  cachix-name:
    description: Cachix cache name (cachix/both backends)
    required: false
    default: ""
  cachix-auth-token:
    description: Cachix auth token (cachix/both backends; needed for pushes)
    required: false
    default: ""
  cachix-extra-pull-names:
    description: Additional Cachix caches to pull from, comma-separated
    required: false
    default: ""
  skip-push:
    description: >-
      Whether to skip pushing built paths to Cachix in the post step. Leave
      empty (default) to push only on non-PR events — pull_request builds skip
      the push, matching the org convention and avoiding 403s when the cache
      token is pull-only / fork PRs have no token. Set "true"/"false" to force.
    required: false
    default: ""
  flake-checker:
    description: Run DeterminateSystems/flake-checker-action against the flake
    required: false
    default: "false"
  enable-kvm:
    description: >-
      Let cachix/install-nix-action set up /dev/kvm (writes a udev rule and runs
      udevadm). Harmless on GitHub-hosted runners, but on self-hosted Arc pods
      that happen to expose /dev/kvm without a working udevd/`udevadm` it fails
      the install. Set "false" for pure Nix builds that don't need a VM.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # The cachix installer fetches the Nix tarball with curl and unpacks it with
    # xz; minimal self-hosted (Arc) pods ship neither. GitHub-hosted runners
    # already have them, so this is a no-op there. (penguin-tools apt-installs
    # these in its own workflow; doing it here covers every nix-setup consumer.)
    - name: Ensure Nix installer prerequisites
      if: ${{ inputs.installer == 'cachix' }}
      shell: bash
      run: |
        if ! command -v xz >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y xz-utils curl
          else
            echo "::warning::xz/curl missing and no apt-get to install them; Nix install may fail"
          fi
        fi

    - name: Install Nix (cachix/install-nix-action)
      if: ${{ inputs.installer == 'cachix' }}
      uses: cachix/install-nix-action@v27
      with:
        install_url: ${{ inputs.install-url }}
        github_access_token: ${{ inputs.github-token }}
        # accept-flake-config trusts the binary cache (substituters +
        # public keys) that org flakes declare in their nixConfig, so builds
        # actually use rehosting-tools.cachix.org instead of warning
        # "ignoring untrusted flake configuration setting" and rebuilding from
        # source. Applied for every nix-setup consumer.
        extra_nix_config: |
          accept-flake-config = true
          ${{ inputs.extra-nix-config }}
        enable_kvm: ${{ inputs.enable-kvm }}

    - name: Install Nix (DeterminateSystems)
      if: ${{ inputs.installer == 'determinate' }}
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: |
          accept-flake-config = true
          ${{ inputs.github-token && format('access-tokens = github.com={0}', inputs.github-token) || '' }}
          ${{ inputs.extra-nix-config }}

    - name: Nix store cache (GitHub Actions cache)
      if: ${{ inputs.cache-backend == 'github' || inputs.cache-backend == 'both' }}
      uses: nix-community/cache-nix-action@v5
      with:
        primary-key: ${{ inputs.cache-key || format('{0}-nix-store', runner.os) }}
        gc-max-store-size-linux: ${{ inputs.gc-max-store-size }}

    - name: Cachix binary cache
      if: ${{ (inputs.cache-backend == 'cachix' || inputs.cache-backend == 'both') && inputs.cachix-name != '' }}
      uses: cachix/cachix-action@v14
      with:
        name: ${{ inputs.cachix-name }}
        authToken: ${{ inputs.cachix-auth-token }}
        extraPullNames: ${{ inputs.cachix-extra-pull-names }}
        # Default: push only on non-PR events. PRs (incl. forks) pull from the
        # cache but never push, so a pull-only / absent token doesn't fail the
        # job's post step. An explicit "true"/"false" overrides the default.
        skipPush: ${{ inputs.skip-push != '' && inputs.skip-push || (github.event_name == 'pull_request') }}

    - name: Flake checker
      if: ${{ inputs.flake-checker == 'true' }}
      uses: DeterminateSystems/flake-checker-action@main
