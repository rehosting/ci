name: Build and push to Harbor

# Reusable workflow (workflow_call) that builds a Docker image and pushes it to
# the Rehosting Arc Harbor registry using the registry buildx cache. It folds
# together the four blocks that were copy-pasted across penguin, fw2tar, qemu,
# igloo_driver, examples, linux_builder and the org's other Harbor repos:
#   1. the REGISTRY/USER/CACHE/TARGET/EXTERNAL_REGISTRY_PASS env fallbacks,
#   2. Harbor cert trust + insecure buildx + login (via arc-registry-setup),
#   3. docker/build-push-action with REGISTRY build-arg injection, and
#   4. the :cache + :cache-PR-<n> (+ optional :cache_last_published) cache refs.
#
# Callers pin it as:
#   uses: rehosting/ci/.github/workflows/build-and-push.yml@v1

on:
  workflow_call:
    inputs:
      image:
        description: Image repo under the registry namespace, e.g. rehosting/penguin
        type: string
        required: true
      runs-on:
        description: Runner label
        type: string
        default: rehosting-arc
      context:
        type: string
        default: "."
      dockerfile:
        description: Path to the Dockerfile (build-push-action `file`)
        type: string
        default: Dockerfile
      target:
        description: Dockerfile build stage to target (empty = final stage)
        type: string
        default: ""
      push:
        type: boolean
        default: true
      load:
        description: Also load the image into the local daemon (for in-job tests)
        type: boolean
        default: false
      tag-sha:
        description: Tag the image <target>/<image>:<github.sha>
        type: boolean
        default: true
      extra-tags:
        description: Additional fully-qualified tags, one per line
        type: string
        default: ""
      build-args:
        description: Extra build-args, one per line (REGISTRY is injected automatically)
        type: string
        default: ""
      inject-registry-build-arg:
        description: Inject REGISTRY=<proxy cache> as a build-arg
        type: boolean
        default: true
      cache-tag:
        description: Base cache tag (penguin uses 'cache'; matrix repos use '<target>_cache')
        type: string
        default: cache
      pr-cache:
        description: On pull_request, also read/write a per-PR cache-PR-<n> tag
        type: boolean
        default: true
      cache-from-extra:
        description: Extra cache-from refs, one per line (e.g. the cache_last_published ref)
        type: string
        default: ""
      cache-to-extra:
        description: >-
          Extra cache-to refs, one per line (e.g. a cache_last_published ref a
          publish job refreshes). Only written when write-cache is true.
        type: string
        default: ""
      write-cache:
        description: Write the shared cache (disable for fork/PR read-only builds)
        type: boolean
        default: true
      buildkit-image:
        description: BuildKit image override (empty = buildx default; see arc-registry-setup)
        type: string
        default: ""
      checkout-ref:
        type: string
        default: ""
      fetch-depth:
        type: number
        default: 0
      dockerhub-user:
        description: Docker Hub username (used only when the dockerhub-token secret is set).
        type: string
        default: ""
    secrets:
      registry:
        description: Harbor host. Empty => external fork defaults are used.
        required: false
      registry-user:
        required: false
      registry-password:
        required: false
      dockerhub-token:
        description: >-
          Docker Hub token. When set, the build also logs in to Docker Hub, so
          extra-tags that reference Docker Hub (bare repos like
          rehosting/penguin:latest) are pushed there in the same build. Leave
          unset for Harbor-only repos.
        required: false
    outputs:
      image-ref:
        description: Fully-qualified image reference that was built
        value: ${{ jobs.build.outputs.image-ref }}

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    env:
      # Same fallback ladder every repo copy-pastes, defined once. External/fork
      # builds (no secrets) fall through to the public proxy + read-only
      # "external" credentials. The external password is NOT hardcoded here: set
      # the org-level variable EXTERNAL_REGISTRY_PASS (Settings -> Variables) so
      # fork builds can authenticate. If unset, fork builds get an empty password
      # and the registry login fails — which is the intended safe default for a
      # public shared repo.
      REGISTRY: ${{ secrets.registry || 'harbor.harbor.svc.cluster.local' }}
      USER: ${{ secrets.registry-user || 'external' }}
      CACHE: ${{ secrets.registry && format('{0}/proxy', secrets.registry) || 'docker.io' }}
      TARGET: ${{ secrets.registry || 'harbor.harbor.svc.cluster.local/external' }}
      PASSWORD: ${{ secrets.registry-password || vars.EXTERNAL_REGISTRY_PASS }}
      # Mapped to env because the `secrets` context is NOT available in a step
      # `if:` — gate the optional Docker Hub login on env instead.
      DOCKERHUB_TOKEN: ${{ secrets.dockerhub-token }}
    outputs:
      image-ref: ${{ steps.ref.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          ref: ${{ inputs.checkout-ref }}

      - name: Set up Arc registry (cert, buildx, login)
        uses: rehosting/ci/actions/arc-registry-setup@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USER }}
          password: ${{ env.PASSWORD }}
          buildkit-image: ${{ inputs.buildkit-image }}

      # Optional second registry: when a Docker Hub token is provided, log in so a
      # single build can push both Harbor (TARGET/...) and Docker Hub (bare-repo)
      # tags listed in extra-tags. Common for repos that publish to both.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub-user }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image reference
        id: ref
        shell: bash
        run: echo "image-ref=${TARGET}/${{ inputs.image }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          load: ${{ inputs.load }}
          tags: |
            ${{ inputs.tag-sha && format('{0}/{1}:{2}', env.TARGET, inputs.image, github.sha) || '' }}
            ${{ inputs.extra-tags }}
          build-args: |
            ${{ inputs.inject-registry-build-arg && format('REGISTRY={0}', env.CACHE) || '' }}
            ${{ inputs.build-args }}
          cache-from: |
            type=registry,ref=${{ env.TARGET }}/${{ inputs.image }}:${{ inputs.cache-tag }},mode=max
            ${{ (inputs.pr-cache && github.event.number) && format('type=registry,ref={0}/{1}:cache-PR-{2},mode=max', env.TARGET, inputs.image, github.event.number) || '' }}
            ${{ inputs.cache-from-extra }}
          cache-to: |
            ${{ inputs.write-cache && format('type=registry,ref={0}/{1}:{2},mode=max', env.TARGET, inputs.image, inputs.cache-tag) || '' }}
            ${{ (inputs.write-cache && inputs.pr-cache && github.event.number) && format('type=registry,ref={0}/{1}:cache-PR-{2}', env.TARGET, inputs.image, github.event.number) || '' }}
            ${{ inputs.write-cache && inputs.cache-to-extra || '' }}
