name: Update flake.lock

# Reusable workflow (workflow_call): install Nix and open a PR that bumps
# flake.lock on a schedule. Generalizes the scheduled flake-update jobs in
# unblob (update-nix.yml) and smallworld (update_flake.yml).
#
# Typical caller:
#   on:
#     schedule: [{ cron: "0 0 * * 0" }]
#     workflow_dispatch:
#   jobs:
#     update:
#       uses: rehosting/ci/.github/workflows/update-flake-lock.yml@v1
#       with:
#         pr-title: "Update flake.lock"
#       secrets:
#         token: ${{ secrets.CREATE_PR_TOKEN }}

on:
  workflow_call:
    inputs:
      flake-path:
        description: Path passed to update-flake-lock (repo root by default)
        type: string
        default: ""
      pr-title:
        type: string
        default: "Update flake.lock"
      pr-labels:
        description: Newline-separated labels for the PR
        type: string
        default: |
          dependencies
          automated
      installer:
        type: string
        default: cachix
      cache-backend:
        type: string
        default: none
      cachix-name:
        type: string
        default: ""
      runs-on:
        type: string
        default: ubuntu-latest
    secrets:
      token:
        description: PAT with permission to open PRs (falls back to GITHUB_TOKEN)
        required: false
      cachix-auth-token:
        required: false

jobs:
  update:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: rehosting/ci/actions/nix-setup@v1
        with:
          installer: ${{ inputs.installer }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-backend: ${{ inputs.cache-backend }}
          cachix-name: ${{ inputs.cachix-name }}
          cachix-auth-token: ${{ secrets.cachix-auth-token }}

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@v21
        with:
          path-to-flake-dir: ${{ inputs.flake-path }}
          token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          pr-title: ${{ inputs.pr-title }}
          pr-labels: ${{ inputs.pr-labels }}
